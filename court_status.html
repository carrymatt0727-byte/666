<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開庭進度查詢 - 臺灣臺島地方檢察署</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-img-placeholder"><i class="fas fa-balance-scale"></i></div>
                <div class="logo-text"><h1>臺灣臺島地方檢察署</h1><p>Taiwan Taidao District Prosecutors Office</p></div>
            </a>
            <nav class="main-nav"><ul class="nav-menu"><li><a href="index.html">回首頁</a></li><li><a href="guide.html">民眾導覽</a></li></ul></nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 0;">
        <div class="section-header"><h2>開庭進度即時查詢</h2></div>
        <div class="news-container" style="padding: 30px;">
            <div style="background:#e1f5fe; padding:20px; border-radius:8px; margin-bottom:30px; border-left:5px solid #0b5394;">
                <i class="fas fa-info-circle"></i> 本查詢系統提供本日各偵查庭之預計開庭進度。實際進度請以現場為準。
            </div>
            
            <table style="width:100%; border-collapse:collapse; margin-top:20px;">
                <thead>
                    <tr style="background:var(--primary-color); color:white;">
                        <th style="padding:15px; border:1px solid #ddd;">偵查庭</th>
                        <th style="padding:15px; border:1px solid #ddd;">案號</th>
                        <th style="padding:15px; border:1px solid #ddd;">預定時間</th>
                        <th style="padding:15px; border:1px solid #ddd;">目前狀態</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="padding:15px; border:1px solid #ddd; text-align:center;">第 1 偵查庭</td>
                        <td style="padding:15px; border:1px solid #ddd; text-align:center;">115年度偵字第00123號</td>
                        <td style="padding:15px; border:1px solid #ddd; text-align:center;">14:00</td>
                        <td style="padding:15px; border:1px solid #ddd; text-align:center; color:#cc0000; font-weight:700;">進行中</td>
                    </tr>
                    <tr style="background:#f9f9f9;">
                        <td style="padding:15px; border:1px solid #ddd; text-align:center;">第 2 偵查庭</td>
                        <td style="padding:15px; border:1px solid #ddd; text-align:center;">115年度他字第00567號</td>
                        <td style="padding:15px; border:1px solid #ddd; text-align:center;">14:30</td>
                        <td style="padding:15px; border:1px solid #ddd; text-align:center; color:#666;">待開庭</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
